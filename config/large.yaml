# ================================================================================
# large.yaml — Multi-GPU Preset
# Target: 4× A100 80GB or 8× H100
# RAM: ~80GB training across GPUs, ~8GB inference
# Expected: ~20000+ tokens/sec (data-parallel)
# Note: Requires torch.distributed setup — see README for launch command
# ================================================================================

model:
  vocab_size: 8192
  d_model: 1024
  num_layers: 24
  num_heads: 16
  num_kv_heads: 4            # GQA: 4× KV compression
  max_seq_len: 2048
  dropout_rate: 0.0          # No dropout at scale (GPT-3 style)
  ffn_type: "swiglu"
  tie_weights: true
  rope_base: 10000.0

train:
  dataset_path: "data/train.txt"
  val_dataset_path: "data/val.txt"
  batch_size: 8              # Per-GPU batch size
  seq_len: 1024
  learning_rate: 1.0e-4
  min_lr: 1.0e-5
  warmup_steps: 5000
  max_steps: 500000
  gradient_accumulation: 8   # Global batch = 8 GPUs × 8 seqs × 8 accum = 512 seqs
  checkpoint_every: 5000
  eval_every: 2000
  eval_steps: 200
  log_every: 5
  weight_decay: 0.1
  grad_clip: 1.0
  keep_last_n_checkpoints: 10

hardware:
  device: "auto"
  mixed_precision: true
  compile_model: true
  gradient_checkpointing: true   # Essential at this scale
