# ================================================================================
# small.yaml — Consumer GPU Preset
# Target: RTX 3060/3070 (8–12GB VRAM) or Apple M1/M2
# RAM: ~2GB training, ~500MB inference
# Expected: ~500–1000 tokens/sec
# ================================================================================

model:
  vocab_size: 16000
  d_model: 256
  num_layers: 6
  num_heads: 8
  num_kv_heads: 2
  max_seq_len: 512
  dropout_rate: 0.1
  ffn_type: "swiglu"
  tie_weights: true

train:
  dataset_path: "data/train.txt"
  val_dataset_path: "data/val.txt"
  batch_size: 16
  seq_len: 256
  learning_rate: 5.0e-4
  min_lr: 5.0e-5
  warmup_steps: 500
  max_steps: 20000
  gradient_accumulation: 2
  checkpoint_every: 1000
  eval_every: 500
  eval_steps: 50
  log_every: 10
  weight_decay: 0.1
  grad_clip: 1.0

hardware:
  device: "auto"
  mixed_precision: true
